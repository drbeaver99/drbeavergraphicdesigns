<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1b4b, #3b2f80, #6d28d9);
    color: white;
}

/* NAVBAR */
.navbar {
    padding: 20px;
    text-align: center;
    background: rgba(0,0,0,0.3);
}

.navbar a {
    margin: 0 15px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.navbar a:hover {
    color: #a855f7;
}

/* CONTAINER */
.container {
    max-width: 800px;
    margin: 80px auto;
    padding: 40px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    text-align: center;
    animation: fadeIn 1s ease-in;
}

/* HEADINGS */
h1 {
    margin-bottom: 10px;
    font-size: 36px;
}

p {
    opacity: 0.8;
    margin-bottom: 30px;
}

/* CONTACT INFO */
.contact-info {
    margin: 20px 0;
    line-height: 1.8;
    font-size: 18px;
}

/* BUTTONS */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 14px 28px;
    border-radius: 30px;
    background: linear-gradient(90deg, #7c3aed, #a855f7);
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.08);
    box-shadow: 0 5px 20px rgba(168,85,247,0.6);
}

/* SOCIALS */
.socials {
    margin-top: 30px;
}

.socials a {
    margin: 10px;
    text-decoration: none;
    color: white;
    font-size: 16px;
    padding: 10px 18px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    transition: 0.3s;
    display: inline-block;
}

.socials a:hover {
    background: #a855f7;
    transform: translateY(-3px);
}

/* LOGO */
.logo {
    width: 120px;
    margin-top: 30px;
    opacity: 0.9;
    transition: 0.3s;
}

.logo:hover {
    transform: scale(1.05);
}

/* FORM */
.form {
    margin-top: 30px;
    text-align: left;
}

.form input,
.form textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.form input::placeholder,
.form textarea::placeholder {
    color: rgba(255,255,255,0.6);
}

.form button {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(90deg, #7c3aed, #a855f7);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.form button:hover {
    transform: scale(1.05);
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 600px) {
    .container {
        margin: 40px 15px;
        padding: 25px;
    }

    h1 {
        font-size: 28px;
    }

    .contact-info {
        font-size: 16px;
    }
}
</style>

</head>

<body>

<!-- NAV -->
<div class="navbar">
    <a href="index.html">Home</a>
    <a href="service.html">Services</a>
    <a href="order.html">Order</a>
    <a href="contact.html">Contact</a>
</div>

<!-- CONTENT -->
<div class="container">

    <h1>Contact Us</h1>
    <p>Let’s bring your ideas to life 🚀</p>

    <div class="contact-info">
        📧 <strong>Email:</strong> drbeavergraphics@gmail.com <br>
        📞 <strong>Phone:</strong> 071 919 4627
    </div>

    <!-- WhatsApp -->
    <a href="https://wa.me/263719194627" class="btn">Chat on WhatsApp</a>

    <!-- CONTACT FORM -->
    <div class="form">
        <h3>Send a Message</h3>

        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea rows="4" placeholder="Your Message"></textarea>

        <button onclick="sendToWhatsApp()">Send Message</button>
    </div>

    <!-- SOCIALS -->
    <div class="socials">
        <h3>Follow Us</h3>

        <a href="https://facebook.com/drbeavergraphics" target="_blank">Facebook</a>
        <a href="https://www.instagram.com/drbeavergraphic_design?igsh=aGlhd2c0MXIxcDFk target="_blank">Instagram</a>
        <a href="tiktok.com/@drbeavergraphicdesigns" target="_blank">Tik Tok</a>
    </div>

    <!-- LOGO -->
    <img src="33092934-ce15-4693-9722-5c513f7d7526.png" class="logo" alt="Logo">

</div>

<script>
function sendToWhatsApp() {
    let name = document.querySelector('input[type="text"]').value;
    let email = document.querySelector('input[type="email"]').value;
    let message = document.querySelector('textarea').value;

    let url = "https://wa.me/263719194627?text="
        + "Name: " + encodeURIComponent(name) + "%0a"
        + "Email: " + encodeURIComponent(email) + "%0a"
        + "Message: " + encodeURIComponent(message);

    window.open(url, '_blank');
}
</script>

</body>
</html>
