<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Dr Beaver Graphic Designs</title>

<link rel="icon" href="33092934-ce15-4693-9722-5c513f7d7526.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#050518;
    color:white;
}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(5,5,25,0.88);
    backdrop-filter:blur(10px);
    padding:14px 0;
    text-align:center;
    z-index:1000;
}

nav a{
    color:white;
    margin:0 12px;
    text-decoration:none;
    font-size:14px;
    opacity:0.85;
    transition:0.3s;
}

nav a:hover{
    color:#c084fc;
    opacity:1;
}

/* MAIN CONTAINER */
.container{
    max-width:850px;
    margin:120px auto 60px;
    padding:45px;
    background:rgba(255,255,255,0.05);
    border-radius:24px;
    backdrop-filter:blur(16px);
    box-shadow:0 15px 45px rgba(0,0,0,0.45);
    text-align:center;
    position:relative;
    overflow:hidden;
    animation:fadeUp 1s ease;
}

/* FLOATING LIGHTS */
.container::before,
.container::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(50px);
    z-index:0;
    animation:floatGlow 7s ease-in-out infinite;
}

.container::before{
    width:180px;
    height:180px;
    background:rgba(168,85,247,0.22);
    top:-30px;
    left:-30px;
}

.container::after{
    width:220px;
    height:220px;
    background:rgba(99,102,241,0.18);
    bottom:-50px;
    right:-40px;
    animation-delay:2s;
}

.container > *{
    position:relative;
    z-index:5;
}

/* TEXT */
h1{
    font-size:34px;
    color:#c084fc;
    margin-bottom:10px;
    text-shadow:0 0 15px rgba(192,132,252,0.35);
}

p{
    opacity:0.82;
    margin-bottom:25px;
}

/* CONTACT INFO */
.contact-info{
    line-height:2;
    font-size:17px;
    margin-bottom:25px;
}

/* BUTTONS */
.btn{
    display:inline-block;
    padding:14px 28px;
    border-radius:50px;
    text-decoration:none;
    color:white;
    font-weight:600;
    background:linear-gradient(135deg,#7e22ce,#a855f7);
    box-shadow:0 10px 25px rgba(168,85,247,0.35);
    transition:0.35s ease;
    position:relative;
    overflow:hidden;
}

.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:60%;
    height:100%;
    background:rgba(255,255,255,0.18);
    transform:skewX(-25deg);
    transition:0.5s;
}

.btn:hover::before{
    left:130%;
}

.btn:hover{
    transform:translateY(-4px) scale(1.02);
    box-shadow:0 14px 30px rgba(168,85,247,0.45);
}

/* FORM */
.form{
    margin-top:40px;
    text-align:left;
}

.form h3{
    text-align:center;
    color:#c084fc;
    margin-bottom:20px;
}

.form input,
.form textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:15px;
}

.form input::placeholder,
.form textarea::placeholder{
    color:rgba(255,255,255,0.55);
}

.form input:focus,
.form textarea:focus{
    outline:none;
    box-shadow:0 0 0 2px #a855f7;
}

.form button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    color:white;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    background:linear-gradient(135deg,#7e22ce,#a855f7);
    box-shadow:0 10px 25px rgba(168,85,247,0.35);
    transition:0.35s ease;
}

.form button:hover{
    transform:translateY(-4px);
}

/* SOCIALS */
.socials{
    margin-top:45px;
}

.socials h3{
    color:#c084fc;
    margin-bottom:18px;
}

.socials a{
    display:inline-block;
    margin:8px;
    padding:12px 18px;
    border-radius:30px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.08);
    transition:0.3s;
}

.socials a:hover{
    background:#a855f7;
    transform:translateY(-3px);
}

/* LOGO */
.logo{
    width:110px;
    margin-top:35px;
    animation:floatLogo 3s ease-in-out infinite;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    font-size:13px;
    opacity:0.6;
}

/* ANIMATION */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes floatGlow{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}

@keyframes floatLogo{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* MOBILE */
@media(max-width:600px){

nav a{
    margin:0 7px;
    font-size:13px;
}

.container{
    margin:100px 15px 40px;
    padding:28px;
}

h1{
    font-size:27px;
}

.contact-info{
    font-size:15px;
}

}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<a href="index.html">Home</a>
<a href="service.html">Services</a>
<a href="order.html">Order</a>
<a href="contact.html">Contact</a>
<a href="portfolio.html">Portfolio</a>
</nav>

<!-- CONTAINER -->
<div class="container">

<h1>Contact Us</h1>
<p>Let’s bring your ideas to life 🚀</p>

<div class="contact-info">
📧 <strong>Email:</strong> drbeavergraphics@gmail.com <br>
📞 <strong>Phone:</strong> 071 919 4627
</div>

<a href="https://wa.me/263719194627?text=Hi%20Dr%20Beaver,%20I%20need%20a%20design"
target="_blank"
class="btn">💬 Chat on WhatsApp</a>

<!-- FORM -->
<div class="form">

<h3>Send a Message</h3>

<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required>
<textarea id="message" rows="5" placeholder="Your Message" required></textarea>

<button onclick="sendToWhatsApp()">Send Message</button>

</div>

<!-- SOCIALS -->
<div class="socials">

<h3>Follow Us</h3>

<a href="https://www.facebook.com/drbeavergraphicdesigns" target="_blank">📘 Facebook</a>

<a href="https://www.instagram.com/drbeavergraphic_design" target="_blank">📸 Instagram</a>

<a href="https://vm.tiktok.com/@drbeavergraphicdesigns" target="_blank">🎵 TikTok</a>

</div>

<img src="33092934-ce15-4693-9722-5c513f7d7526.png" class="logo" alt="Logo">

</div>

<footer>
© 2026 Dr Beaver Graphic Designs
</footer>

<script>
function sendToWhatsApp(){

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let message=document.getElementById("message").value.trim();

if(!name || !email || !message){
alert("Please fill in all fields.");
return;
}

let text=`Hello Dr Beaver 👋

*New Contact Message*

👤 Name: ${name}
📧 Email: ${email}
📝 Message: ${message}`;

let url="https://wa.me/263719194627?text="+encodeURIComponent(text);

window.open(url,"_blank");
}
</script>

</body>
</html>
