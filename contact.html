<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Dr Beaver Graphic Designs</title>

<link rel="icon" href="33092934-ce15-4693-9722-5c513f7d7526.png">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #050518;
    color: white;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(5,5,25,0.9);
    backdrop-filter: blur(10px);
    padding: 12px 0;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 12px;
    text-decoration: none;
    font-size: 14px;
    opacity: 0.8;
    transition: 0.3s;
}

nav a:hover {
    opacity: 1;
    color: #c084fc;
}

/* CONTAINER */
.container {
    max-width: 800px;
    margin: 120px auto 60px;
    padding: 40px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    backdrop-filter: blur(14px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    text-align: center;
    animation: fadeIn 1s ease-in;
}

/* TEXT */
h1 {
    margin-bottom: 10px;
    font-size: 34px;
    color: #c084fc;
}

p {
    opacity: 0.8;
    margin-bottom: 25px;
}

/* CONTACT INFO */
.contact-info {
    margin: 20px 0;
    line-height: 1.8;
    font-size: 17px;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 14px 28px;
    border-radius: 30px;
    background: linear-gradient(45deg, #6a0dad, #a855f7);
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-2px);
    opacity: 0.9;
}

/* FORM */
.form {
    margin-top: 35px;
    text-align: left;
}

.form h3 {
    text-align: center;
    color: #c084fc;
}

.form input,
.form textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

.form input::placeholder,
.form textarea::placeholder {
    color: rgba(255,255,255,0.6);
}

.form input:focus,
.form textarea:focus {
    outline: none;
    box-shadow: 0 0 0 2px #a855f7;
}

.form button {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #6a0dad, #a855f7);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.form button:hover {
    transform: translateY(-2px);
}

/* SOCIALS */
.socials {
    text-align: center;
    margin-top: 40px;
}

.socials h3 {
    margin-bottom: 15px;
    color: #c084fc;
}

.socials a {
    display: inline-block;
    margin: 8px;
    padding: 10px 18px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.socials a:hover {
    background: #a855f7;
}

/* LOGO */
.logo {
    width: 110px;
    margin-top: 30px;
    opacity: 0.9;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    font-size: 13px;
    opacity: 0.6;
}

/* MOBILE */
@media (max-width: 600px) {
    .container {
        margin: 100px 15px 40px;
        padding: 25px;
    }

    h1 {
        font-size: 26px;
    }
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="index.html">Home</a>
    <a href="service.html">Services</a>
    <a href="order.html">Order</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">

    <h1>Contact Us</h1>
    <p>Let’s bring your ideas to life 🚀</p>

    <div class="contact-info">
        📧 <strong>Email:</strong> drbeavergraphics@gmail.com <br>
        📞 <strong>Phone:</strong> 071 919 4627
    </div>

    <a href="https://wa.me/263719194627" target="_blank" class="btn">💬 Chat on WhatsApp</a>

    <!-- FORM -->
    <div class="form">
        <h3>Send a Message</h3>

        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" rows="4" placeholder="Your Message" required></textarea>

        <button onclick="sendToWhatsApp()">Send Message</button>
    </div>

    <!-- SOCIALS -->
    <div class="socials">
        <h3>Follow Us</h3>

        <a href="https://www.facebook.com/drbeavergraphicdesigns" target="_blank">📘 Facebook</a>
        <a href="https://www.instagram.com/drbeavergraphic_design" target="_blank">📸 Instagram</a>
        <a href="https://vm.tiktok.com/@drbeavergraphicdesigns" target="_blank">🎵 TikTok</a>
    </div>

    <img src="33092934-ce15-4693-9722-5c513f7d7526.png" class="logo" alt="Logo">

</div>

<footer>
    © 2026 Dr Beaver Graphic Designs
</footer>

<script>
function sendToWhatsApp() {
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let message = document.getElementById("message").value.trim();

    if (!name || !email || !message) {
        alert("Please fill in all fields.");
        return;
    }

    let text = `Hello Dr Beaver 👋

*New Contact Message*

👤 Name: ${name}
📧 Email: ${email}
📝 Message: ${message}`;

    let url = "https://wa.me/263719194627?text=" + encodeURIComponent(text);

    if (confirm("Send this message via WhatsApp?")) {
        window.open(url, "_blank");
    }
}
</script>

</body>
</html>
