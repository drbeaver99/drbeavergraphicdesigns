<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1b4b, #3b2f80, #6d28d9);
    color: white;
}

/* NAVBAR */
.navbar {
    padding: 20px;
    text-align: center;
    background: rgba(0,0,0,0.3);
}

.navbar a {
    margin: 0 15px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.navbar a:hover {
    color: #a855f7;
}

/* CONTAINER */
.container {
    max-width: 800px;
    margin: 80px auto;
    padding: 40px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    text-align: center;
    animation: fadeIn 1s ease-in;
}

/* TEXT */
h1 {
    margin-bottom: 10px;
    font-size: 36px;
}

p {
    opacity: 0.8;
    margin-bottom: 30px;
}

/* CONTACT INFO */
.contact-info {
    margin: 20px 0;
    line-height: 1.8;
    font-size: 18px;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 14px 28px;
    border-radius: 30px;
    background: linear-gradient(90deg, #7c3aed, #a855f7);
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* FORM */
.form {
    margin-top: 30px;
    text-align: left;
}

.form input,
.form textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.form input::placeholder,
.form textarea::placeholder {
    color: rgba(255,255,255,0.6);
}

.form input:focus,
.form textarea:focus {
    outline: none;
    box-shadow: 0 0 0 2px #a855f7;
}

.form button {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(90deg, #7c3aed, #a855f7);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.form button:hover {
    transform: scale(1.03);
}

/* SOCIALS */
.socials {
    text-align: center;
    margin-top: 40px;
}

.socials h3 {
    margin-bottom: 15px;
    color: #c084fc;
}

.socials a {
    display: inline-block;
    margin: 8px;
    padding: 10px 18px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    color: white;
    text-decoration: none;
}

.socials a:hover {
    background: #a855f7;
}

/* LOGO */
.logo {
    width: 120px;
    margin-top: 30px;
}

/* MOBILE */
@media (max-width: 600px) {
    .container {
        margin: 40px 15px;
        padding: 25px;
    }

    h1 {
        font-size: 28px;
    }
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="service.html">Services</a>
    <a href="order.html">Order</a>
    <a href="contact.html">Contact</a>
</div>

<div class="container">

    <h1>Contact Us</h1>
    <p>Let’s bring your ideas to life 🚀</p>

    <div class="contact-info">
        📧 <strong>Email:</strong> drbeavergraphics@gmail.com <br>
        📞 <strong>Phone:</strong> 071 919 4627
    </div>

    <a href="https://wa.me/263719194627" class="btn">💬 Chat on WhatsApp</a>

    <!-- FORM -->
    <div class="form">
        <h3>Send a Message</h3>

        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" rows="4" placeholder="Your Message" required></textarea>

        <button onclick="sendToWhatsApp()">Send Message</button>
    </div>

    <!-- SOCIALS -->
    <div class="socials">
        <h3>Follow Us</h3>

        <a href="https://www.facebook.com/drbeavergraphicdesigns" target="_blank" rel="noopener noreferrer">📘 Facebook</a>
        <a href="https://www.instagram.com/drbeavergraphic_design" target="_blank" rel="noopener noreferrer">📸 Instagram</a>
        <a href="https://vm.tiktok.com/@drbeavergraphicdesigns" target="_blank" rel="noopener noreferrer">🎵 TikTok</a>
    </div>

    <img src="33092934-ce15-4693-9722-5c513f7d7526.png" class="logo" alt="Logo">

</div>

<script>
function sendToWhatsApp() {
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let message = document.getElementById("message").value.trim();

    if (!name || !email || !message) {
        alert("Please fill in all fields.");
        return;
    }

    let text = `Hello Dr Beaver 👋

*New Contact Message*

👤 Name: ${name}
📧 Email: ${email}
📝 Message: ${message}`;

    let url = "https://wa.me/263719194627?text=" + encodeURIComponent(text);

    if (confirm("Send this message via WhatsApp?")) {
        window.open(url, "_blank");
    }
}
</script>

</body>
</html>
