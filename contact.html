<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1b4b, #3b2f80, #6d28d9);
    color: white;
}

/* Container */
.container {
    max-width: 800px;
    margin: 80px auto;
    padding: 40px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    text-align: center;
}

/* Headings */
h1 {
    margin-bottom: 10px;
}

p {
    opacity: 0.8;
    margin-bottom: 30px;
}

/* Contact Info */
.contact-info {
    margin: 20px 0;
    line-height: 1.8;
    font-size: 18px;
}

/* Buttons */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 30px;
    background: linear-gradient(90deg, #7c3aed, #a855f7);
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 20px rgba(168,85,247,0.6);
}

/* Social icons */
.socials {
    margin-top: 30px;
}

.socials a {
    margin: 0 10px;
    text-decoration: none;
    color: white;
    font-size: 18px;
    padding: 10px 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    transition: 0.3s;
}

.socials a:hover {
    background: #a855f7;
}
/* Logo */
.logo {
    width: 120px;
    margin-top: 30px;
    opacity: 0.9;
}

.navbar {
    padding: 20px;
    text-align: center;
    background: rgba(0,0,0,0.3);
}

.navbar a {
    margin: 0 15px;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.navbar a:hover {
    color: #a855f7;
}

</style>

</head>

<body>

</div>
