<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order | Dr Beaver Graphic Designs</title>

<link rel="icon" href="33092934-ce15-4693-9722-5c513f7d7526.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Inter',sans-serif;
    background:#050518;
    background-image:
        radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%),
        radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%),
        radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
    background-attachment:fixed;
    color:white;
    overflow-x:hidden;
}

/* floating glow background */
body::before,
body::after{
    content:"";
    position:fixed;
    width:320px;
    height:320px;
    border-radius:50%;
    filter:blur(80px);
    z-index:-1;
    animation:floatGlow 8s ease-in-out infinite;
}

body::before{
    top:10%;
    left:-80px;
    background:rgba(168,85,247,0.18);
}

body::after{
    bottom:10%;
    right:-80px;
    background:rgba(59,130,246,0.18);
    animation-delay:2s;
}

@keyframes floatGlow{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(30px);}
}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:1000;
    text-align:center;
    padding:18px 10px;
    background:rgba(5,5,25,0.78);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(255,255,255,0.05);
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 14px;
    font-size:13px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    opacity:.75;
    transition:.3s;
}

nav a:hover{
    color:#c084fc;
    opacity:1;
}

/* CONTAINER */
.container{
    max-width:860px;
    margin:130px auto 60px;
    padding:42px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:26px;
    backdrop-filter:blur(18px);
    box-shadow:0 20px 45px rgba(0,0,0,0.35);
    animation:fadeUp 1s ease;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(25px);}
    to{opacity:1;transform:translateY(0);}
}

h1{
    font-family:'Syne',sans-serif;
    text-align:center;
    font-size:clamp(30px,6vw,48px);
    margin-bottom:10px;
    background:linear-gradient(to bottom,#fff,#c084fc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    text-align:center;
    opacity:.68;
    margin-bottom:35px;
    font-size:15px;
}

/* layout */
.row{
    display:flex;
    gap:18px;
}

.form-group{
    margin-bottom:22px;
    flex:1;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:12px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#c084fc;
}

/* inputs */
input,
select,
textarea{
    width:100%;
    padding:16px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.04);
    color:white;
    font-size:16px;
    font-family:'Inter',sans-serif;
    outline:none;
    transition:.3s;
}

textarea{
    min-height:140px;
    resize:none;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#a855f7;
    box-shadow:0 0 18px rgba(168,85,247,0.25);
    background:rgba(255,255,255,0.06);
}

/* mobile-safe options */
select option{
    background:#111;
    color:#fff;
}

/* price box */
.price-box{
    margin-top:8px;
    padding:14px 18px;
    border-radius:14px;
    background:rgba(168,85,247,0.08);
    border:1px solid rgba(168,85,247,0.18);
    font-size:14px;
    color:#d8b4fe;
}

/* button */
button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    margin-top:12px;
    background:linear-gradient(135deg,#9333ea,#c084fc);
    color:white;
    font-size:14px;
    font-weight:800;
    letter-spacing:2px;
    text-transform:uppercase;
    cursor:pointer;
    transition:.35s;
    box-shadow:0 12px 28px rgba(168,85,247,0.35);
}

button:hover{
    transform:translateY(-4px) scale(1.01);
    box-shadow:0 18px 38px rgba(168,85,247,0.45);
}

/* note */
.note{
    margin-top:18px;
    text-align:center;
    font-size:12px;
    opacity:.45;
    letter-spacing:1px;
    text-transform:uppercase;
}

footer{
    text-align:center;
    padding:35px 20px;
    font-size:12px;
    opacity:.45;
    letter-spacing:2px;
    text-transform:uppercase;
}

/* mobile */
@media(max-width:700px){
    .row{
        flex-direction:column;
        gap:0;
    }

    .container{
        margin:115px 14px 40px;
        padding:28px 20px;
    }

    nav a{
        margin:0 8px;
        font-size:11px;
    }
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="service.html">Services</a>
<a href="portfolio.html">Portfolio</a>
<a href="order.html">Order</a>
<a href="track.html">Track</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">

<h1>Start Your Project</h1>
<p class="subtitle">Tell us what you need and we’ll build something premium.</p>

<div class="row">
<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" placeholder="John Doe">
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" id="email" placeholder="example@email.com">
</div>
</div>

<div class="row">
<div class="form-group">
<label>Select Service</label>
<select id="service" onchange="updateBudget()">
<option value="">Choose service</option>
<option>🎨 Logo Design</option>
<option>📄 Flyer Design</option>
<option>🖼 Poster Design</option>
<option>🎨 Social Media Graphics</option>
<option>📱 Social Media Management</option>
<option>🌐 Website Design</option>
<option>🔥 Combo Package</option>
</select>
</div>

<div class="form-group">
<label>Select Package / Budget</label>
<select id="budget" onchange="showPrice()">
<option value="">Select budget</option>
</select>
<div class="price-box" id="priceBox">Choose a service to view packages.</div>
</div>
</div>

<div class="form-group">
<label>Project Details</label>
<textarea id="details" placeholder="Describe your project vision..."></textarea>
</div>

<div class="form-group">
<label>Preferred Deadline</label>
<input type="date" id="date">
</div>

<button onclick="sendToWhatsApp()">🚀 Submit & Start Chat</button>

<p class="note">Directly connected to Dr Beaver Graphic Designs</p>

</div>

<footer>© 2026 Dr Beaver Graphic Designs</footer>

<script>
function updateBudget(){

let service = document.getElementById("service").value;
let budget = document.getElementById("budget");
let priceBox = document.getElementById("priceBox");

budget.innerHTML = '<option value="">Select budget</option>';

let options = [];

if(service === "🌐 Website Design"){
options = ["Starter Website - $80","Business Website - $120","Premium Website - $150"];
}

else if(service === "📱 Social Media Management"){
options = ["Starter Growth - $50","Business Boost - $80","Premium Brand - $100"];
}

else if(service === "🎨 Social Media Graphics"){
options = [
"Starter Pack (2 posts/week) - $15",
"5 Posts per week - $25",
"1 Month Premium - $50"
];
}

else if(service === "🔥 Combo Package"){
options = [
"Logo + Flyer - $20",
"Logo + Poster - $25",
"Logo + Branding Kit - $35",
"Logo + Flyer + Poster - $40"
];
}

else if(service === "🎨 Logo Design"){
options = ["Basic Logo - $10","Premium Logo - $20","Luxury Logo - $30"];
}

else if(service === "📄 Flyer Design"){
options = ["Single Flyer - $10","Premium Flyer - $18"];
}

else if(service === "🖼 Poster Design"){
options = ["Poster Design - $15","Premium Poster - $25"];
}

options.forEach(item=>{
let opt = document.createElement("option");
opt.value = item;
opt.textContent = item;
budget.appendChild(opt);
});

priceBox.innerHTML = "Select a package to continue.";
}

function showPrice(){
let selected = document.getElementById("budget").value;
document.getElementById("priceBox").innerHTML =
selected ? "Selected Package: <strong>"+selected+"</strong>" : "Select a package.";
}

function sendToWhatsApp(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let service = document.getElementById("service").value;
let budget = document.getElementById("budget").value;
let details = document.getElementById("details").value.trim();
let date = document.getElementById("date").value;

if(!name || !email || !service || !budget || !details){
alert("Please fill in all required fields.");
return;
}

let msg =
`Hello Dr Beaver 👋

*NEW ORDER REQUEST*

👤 Name: ${name}
📧 Email: ${email}
🛠 Service: ${service}
💰 Package: ${budget}
📝 Details: ${details}
📅 Deadline: ${date || "Not specified"}`;

let url = "https://wa.me/263719194627?text=" + encodeURIComponent(msg);

window.open(url,"_blank");
}
</script>

</body>
</html>
