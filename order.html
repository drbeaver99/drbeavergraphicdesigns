<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order | Dr Beaver Graphic Designs</title>

<link rel="icon" href="33092934-ce15-4693-9722-5c513f7d7526.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#050518;
background-image:
radial-gradient(circle at top left,#22063d,#050518 45%),
radial-gradient(circle at bottom right,#3a0b67,#050518 45%);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 10px;
text-align:center;
background:rgba(5,5,25,.78);
backdrop-filter:blur(14px);
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.05);
}

nav a{
color:white;
text-decoration:none;
margin:0 12px;
font-size:13px;
font-weight:600;
letter-spacing:1px;
text-transform:uppercase;
opacity:.75;
transition:.3s;
}

nav a:hover{
opacity:1;
color:#c084fc;
}

/* BOX */
.container{
max-width:860px;
margin:125px auto 45px;
padding:40px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
border-radius:26px;
backdrop-filter:blur(18px);
box-shadow:0 20px 45px rgba(0,0,0,.35);
animation:fadeUp .8s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

h1{
font-family:'Syne',sans-serif;
font-size:clamp(30px,6vw,48px);
text-align:center;
margin-bottom:10px;
background:linear-gradient(to bottom,#fff,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
opacity:.68;
margin-bottom:30px;
}

/* FORM */
.row{
display:flex;
gap:18px;
}

.form-group{
flex:1;
margin-bottom:22px;
}

label{
display:block;
margin-bottom:8px;
font-size:12px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
color:#c084fc;
}

input,select,textarea{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.04);
color:white;
font-size:16px;
outline:none;
transition:.3s;
font-family:'Inter',sans-serif;
}

textarea{
min-height:140px;
resize:none;
}

input:focus,select:focus,textarea:focus{
border-color:#a855f7;
box-shadow:0 0 18px rgba(168,85,247,.25);
background:rgba(255,255,255,.06);
}

select option{
background:#111;
color:#fff;
}

.price-box{
margin-top:10px;
padding:14px;
border-radius:14px;
background:rgba(168,85,247,.08);
border:1px solid rgba(168,85,247,.18);
font-size:14px;
color:#d8b4fe;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:14px;
margin-top:10px;
background:linear-gradient(135deg,#9333ea,#c084fc);
color:white;
font-size:14px;
font-weight:800;
letter-spacing:2px;
text-transform:uppercase;
cursor:pointer;
transition:.35s;
box-shadow:0 12px 28px rgba(168,85,247,.35);
}

button:hover{
transform:translateY(-4px);
box-shadow:0 18px 38px rgba(168,85,247,.45);
}

.note{
margin-top:18px;
text-align:center;
font-size:12px;
opacity:.45;
letter-spacing:1px;
text-transform:uppercase;
}

/* POPUP */
#popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.popup-box{
max-width:420px;
width:100%;
background:#11142f;
padding:28px;
border-radius:22px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.45);
}

.popup-box h2{
color:#4ade80;
margin-bottom:12px;
}

.popup-box p{
opacity:.8;
line-height:1.7;
margin-bottom:18px;
}

.popup-box button{
margin-top:0;
}

/* FOOTER */
footer{
text-align:center;
padding:35px 20px;
font-size:12px;
opacity:.45;
letter-spacing:2px;
text-transform:uppercase;
}

@media(max-width:700px){
.row{
flex-direction:column;
gap:0;
}

.container{
margin:110px 14px 40px;
padding:28px 20px;
}

nav a{
margin:0 7px;
font-size:11px;
}
}
</style>
</head>
<body>

<nav>
<a href="index.html">Home</a>
<a href="service.html">Services</a>
<a href="portfolio.html">Portfolio</a>
<a href="order.html">Order</a>
<a href="track.html">Track</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">

<h1>Start Your Project</h1>
<p class="subtitle">Tell us what you need and we’ll bring it to life.</p>

<div class="row">
<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" placeholder="John Doe">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" placeholder="example@email.com">
</div>
</div>

<div class="row">
<div class="form-group">
<label>Select Service</label>
<select id="service" onchange="updateBudget()">
<option value="">Choose service</option>
<option>🎨 Logo Design</option>
<option>📄 Flyer Design</option>
<option>🖼 Poster Design</option>
<option>🎨 Social Media Graphics</option>
<option>📱 Social Media Management</option>
<option>🌐 Website Design</option>
<option>🔥 Combo Package</option>
</select>
</div>

<div class="form-group">
<label>Package / Budget</label>
<select id="budget" onchange="showPrice()">
<option value="">Select package</option>
</select>

<div class="price-box" id="priceBox">
Choose service to view packages.
</div>
</div>
</div>

<div class="form-group">
<label>Project Details</label>
<textarea id="details" placeholder="Describe your vision..."></textarea>
</div>

<div class="form-group">
<label>Preferred Deadline</label>
<input type="date" id="date">
</div>

<button onclick="submitOrder()">🚀 Submit Order</button>

<p class="note">You will receive an automatic tracking ID.</p>

</div>

<footer>© 2026 Dr Beaver Graphic Designs</footer>

<!-- SUCCESS POPUP -->
<div id="popup">
<div class="popup-box">
<h2>Order Submitted!</h2>
<p id="popupText"></p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBIjF4ZAYgQiEdgA-EID7nD3L1OTrymiZM",
authDomain: "dr-beaver-graphic-designs.firebaseapp.com",
projectId: "dr-beaver-graphic-designs",
storageBucket: "dr-beaver-graphic-designs.firebasestorage.app",
messagingSenderId: "129079631486",
appId: "1:129079631486:web:f42119fbd75cfdd9b1022f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* Packages */
window.updateBudget = function(){

let service = document.getElementById("service").value;
let budget = document.getElementById("budget");
let priceBox = document.getElementById("priceBox");

budget.innerHTML = '<option value="">Select package</option>';

let list = [];

if(service==="🌐 Website Design"){
list = [
"Starter Website - $80",
"Business Website - $120",
"Premium Website - $150"
];
}

else if(service==="📱 Social Media Management"){
list = [
"Starter Growth - $50",
"Business Boost - $80",
"Premium Brand - $100"
];
}

else if(service==="🎨 Social Media Graphics"){
list = [
"Starter Pack (2 posts/week) - $15",
"5 Posts Per Week - $25",
"1 Month Premium - $50"
];
}

else if(service==="🔥 Combo Package"){
list = [
"Logo + Flyer - $20",
"Logo + Poster - $25",
"Logo + Branding Kit - $35",
"Logo + Flyer + Poster - $40"
];
}

else if(service==="🎨 Logo Design"){
list = [
"Basic Logo - $10",
"Premium Logo - $20",
"Luxury Logo - $30"
];
}

else if(service==="📄 Flyer Design"){
list = [
"Single Flyer - $10",
"Premium Flyer - $18"
];
}

else if(service==="🖼 Poster Design"){
list = [
"Poster Design - $15",
"Premium Poster - $25"
];
}

list.forEach(item=>{
let opt = document.createElement("option");
opt.value = item;
opt.textContent = item;
budget.appendChild(opt);
});

priceBox.innerHTML = "Select a package.";
}

window.showPrice = function(){
let selected = document.getElementById("budget").value;
document.getElementById("priceBox").innerHTML =
selected ? "Selected: <strong>"+selected+"</strong>" : "Select package.";
}

/* Submit */
window.submitOrder = async function(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let service = document.getElementById("service").value;
let budget = document.getElementById("budget").value;
let details = document.getElementById("details").value.trim();
let date = document.getElementById("date").value;

if(!name || !email || !service || !budget || !details){
alert("Please fill all required fields.");
return;
}

/* AUTO ID */
let orderId = "DB" + Date.now().toString().slice(-6);

/* SAVE TO FIREBASE */
await setDoc(doc(db,"orders",orderId),{
orderId:orderId,
name:name,
email:email,
service:service,
budget:budget,
details:details,
deadline:date || "Not specified",
status:"Pending",
createdAt:serverTimestamp()
});

/* SHOW POPUP */
document.getElementById("popup").style.display="flex";
document.getElementById("popupText").innerHTML =
`Your Order ID is <strong>${orderId}</strong><br><br>
Use this ID on the Track page.`;

/* SEND WHATSAPP */
let msg =
`Hello Dr Beaver 👋

*NEW ORDER REQUEST*

🆔 Order ID: ${orderId}
👤 Name: ${name}
📧 Email: ${email}
🛠 Service: ${service}
💰 Package: ${budget}
📝 Details: ${details}
📅 Deadline: ${date || "Not specified"}`;

let url = "https://wa.me/263719194627?text=" + encodeURIComponent(msg);

setTimeout(()=>{
window.open(url,"_blank");
},1200);

}

/* Close popup */
window.closePopup = function(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
