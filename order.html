<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Start Your Project</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1b4b, #3b2f80, #6d28d9);
    color: white;
}

.container {
    max-width: 900px;
    margin: 60px auto;
    padding: 30px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
}

h1, p {
    text-align: center;
}

.form-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

input, select, textarea {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

textarea {
    width: 100%;
}

button {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    background: linear-gradient(90deg, #7c3aed, #a855f7);
    color: white;
    border: none;
    margin-top: 20px;
}

.navbar {
    text-align: center;
    padding: 15px;
}

.navbar a {
    margin: 0 10px;
    color: white;
    text-decoration: none;
}

@media (max-width: 600px) {
    .form-group {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="service.html">Services</a>
    <a href="order.html">Order</a>
    <a href="contact.html">Contact</a>
</div>

<div class="container">
    <h1>Start Your Project</h1>
    <p>Tell us what you need and we’ll bring your ideas to life</p>

    <div class="form-group">
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="form-group">
        <select id="service">
            <option disabled selected>Select Service</option>
            <option>Logo Design</option>
            <option>Flyer Design</option>
            <option>Brand Identity</option>
            <option>Social Media Graphics</option>
            <option>Website Design</option>
        </select>

        <select id="budget">
            <option disabled selected>Select Budget</option>
            <option>Under $50</option>
            <option>$50 - $100</option>
            <option>$100 - $300</option>
            <option>$300+</option>
        </select>
    </div>

    <textarea id="details" placeholder="Describe your project..."></textarea>

    <input type="date" id="date">

    <button onclick="sendToWhatsApp()">Submit & Chat</button>
</div>

<script>
function sendToWhatsApp() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let service = document.getElementById("service").value;
    let budget = document.getElementById("budget").value;
    let details = document.getElementById("details").value;
    let date = document.getElementById("date").value;

    let message = `Hello Dr Beaver,
Name: ${name}
Email: ${email}
Service: ${service}
Budget: ${budget}
Details: ${details}
Deadline: ${date}`;

    let url = "https://wa.me/263719194627?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}
</script>

</body>
</html>
