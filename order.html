<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Start Your Project | Dr Beaver Graphic Designs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="33092934-ce15-4693-9722-5c513f7d7526.png">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #050518;
    color: white;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(5,5,25,0.9);
    backdrop-filter: blur(10px);
    padding: 12px 0;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 12px;
    text-decoration: none;
    font-size: 14px;
    opacity: 0.8;
    transition: 0.3s;
}

nav a:hover {
    opacity: 1;
    color: #c084fc;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: 120px auto 60px;
    padding: 35px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    backdrop-filter: blur(14px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
}

/* TEXT */
h1 {
    text-align: center;
    color: #c084fc;
    margin-bottom: 10px;
}

p {
    text-align: center;
    opacity: 0.8;
    margin-bottom: 25px;
}

/* FORM */
.form-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    margin-bottom: 15px;
}

label {
    display: block;
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 5px;
}

/* INPUTS */
input, select, textarea {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
    width: 100%;
}

textarea {
    min-height: 120px;
}

input::placeholder,
textarea::placeholder {
    color: rgba(255,255,255,0.6);
}

/* FOCUS */
input:focus, select:focus, textarea:focus {
    outline: none;
    box-shadow: 0 0 0 2px #a855f7;
}

/* BUTTON */
button {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    background: linear-gradient(45deg, #6a0dad, #a855f7);
    color: white;
    border: none;
    margin-top: 20px;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    opacity: 0.9;
    cursor: pointer;
}

/* NOTE */
.note {
    text-align: center;
    font-size: 12px;
    opacity: 0.6;
    margin-top: 10px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    font-size: 13px;
    opacity: 0.6;
}

/* MOBILE */
@media (max-width: 600px) {
    .form-group {
        flex-direction: column;
    }

    .container {
        margin: 100px 15px 40px;
        padding: 25px;
    }
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="index.html">Home</a>
    <a href="service.html">Services</a>
    <a href="order.html">Order</a>
    <a href="contact.html">Contact</a>
    <a href="portfolio.html">Portfolio</a>
</nav>

<div class="container">
    <h1>Start Your Project</h1>
    <p>Tell us what you need and we’ll bring your ideas to life</p>

    <div class="form-group">
        <div style="flex:1;">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="John Doe" required>
        </div>

        <div style="flex:1;">
            <label>Email</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>
    </div>

    <div class="form-group">
        <div style="flex:1;">
            <label>Select Service</label>
            <select id="service" required>
                <option disabled selected value="">Choose a service</option>
                <option>🎨 Logo Design</option>
                <option>📄 Flyer Design</option>
                <option>🏷 Brand Identity</option>
                <option>📱 Social Media Graphics</option>
                <option>🌐 Website Design</option>
            </select>
        </div>

        <div style="flex:1;">
            <label>Budget</label>
            <select id="budget" required>
                <option disabled selected value="">Select budget</option>
                <option>Under $15</option>
                <option>$15 - $30</option>
                <option>$30 - $50</option>
                <option>$50+</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <div style="width:100%;">
            <label>Project Details</label>
            <textarea id="details" placeholder="Describe your project..." required></textarea>
        </div>
    </div>

    <div class="form-group">
        <div style="width:100%;">
            <label>Deadline</label>
            <input type="date" id="date">
        </div>
    </div>

    <button onclick="sendToWhatsApp()">🚀 Submit & Chat on WhatsApp</button>

    <p class="note">
        Your information is safe and will only be used to contact you.
    </p>
</div>

<footer>
    © 2026 Dr Beaver Graphic Designs
</footer>

<script>
function sendToWhatsApp() {
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let service = document.getElementById("service").value;
    let budget = document.getElementById("budget").value;
    let details = document.getElementById("details").value.trim();
    let date = document.getElementById("date").value;

    if (!name || !email || !service || !budget || !details) {
        alert("Please fill in all required fields.");
        return;
    }

    let message = `Hello Dr Beaver 👋

*New Project Request*

👤 Name: ${name}
📧 Email: ${email}
🎨 Service: ${service}
💰 Budget: ${budget}
📝 Details: ${details}
📅 Deadline: ${date || "Not specified"}`;

    let url = "https://wa.me/263719194627?text=" + encodeURIComponent(message);

    if (confirm("Proceed to WhatsApp to send your project details?")) {
        window.open(url, "_blank");
    }
}
</script>

</body>
</html>
