<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Your Project | Dr Beaver Graphic Designs</title>

<link rel="icon" href="33092934-ce15-4693-9722-5c513f7d7526.png">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#050518;
    background-image:
    radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%),
    radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%),
    radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
    background-attachment:fixed;
    color:white;
    overflow-x:hidden;
}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(5,5,25,0.75);
    backdrop-filter:blur(15px);
    padding:18px 0;
    text-align:center;
    z-index:1000;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 18px;
    font-size:13px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:1px;
    opacity:0.75;
    transition:0.3s;
}

nav a:hover{
    color:#c084fc;
    opacity:1;
}

/* CONTAINER */
.container{
    max-width:820px;
    margin:140px auto 60px;
    padding:45px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:24px;
    backdrop-filter:blur(20px);
    box-shadow:0 25px 50px rgba(0,0,0,0.35);
}

/* TEXT */
h1{
    font-family:'Syne',sans-serif;
    text-align:center;
    font-size:clamp(28px,5vw,42px);
    margin-bottom:10px;
    background:linear-gradient(to bottom,#fff,#c084fc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    text-align:center;
    opacity:0.65;
    margin-bottom:40px;
}

/* FORM */
.form-group{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:25px;
    animation:fadeUp 0.8s ease;
}

label{
    display:block;
    font-size:12px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:8px;
    color:#c084fc;
}

input,
select,
textarea{
    width:100%;
    padding:14px 18px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.05);
    color:white;
    font-size:15px;
    font-family:'Inter',sans-serif;
    transition:0.3s;
}

select option{
    background:#111126;
    color:white;
}

textarea{
    min-height:140px;
    resize:none;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:#c084fc;
    background:rgba(255,255,255,0.08);
    box-shadow:0 0 15px rgba(192,132,252,0.25);
}

/* BUTTON */
button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:12px;
    background:#a855f7;
    color:white;
    font-size:14px;
    font-weight:700;
    letter-spacing:2px;
    cursor:pointer;
    transition:0.35s;
    box-shadow:0 10px 30px rgba(168,85,247,0.35);
}

button:hover{
    transform:translateY(-5px);
    background:#c084fc;
    box-shadow:0 15px 40px rgba(168,85,247,0.5);
}

.note{
    text-align:center;
    font-size:11px;
    opacity:0.45;
    margin-top:20px;
    text-transform:uppercase;
    letter-spacing:1px;
}

footer{
    text-align:center;
    padding:40px 20px;
    font-size:12px;
    opacity:0.45;
}

/* ANIMATION */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE */
@media(max-width:600px){

.container{
    margin:110px 15px 40px;
    padding:30px 20px;
}

.form-group{
    flex-direction:column;
    gap:15px;
}

nav a{
    margin:0 8px;
    font-size:11px;
}

}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="service.html">Services</a>
<a href="order.html">Order</a>
<a href="contact.html">Contact</a>
<a href="portfolio.html">Portfolio</a>
</nav>

<div class="container">

<h1>Start Your Project</h1>
<p class="subtitle">Tell us what you need and we’ll bring your ideas to life.</p>

<!-- NAME + EMAIL -->
<div class="form-group">

<div style="flex:1;">
<label>Full Name</label>
<input type="text" id="name" placeholder="John Doe" required>
</div>

<div style="flex:1;">
<label>Email Address</label>
<input type="email" id="email" placeholder="example@email.com" required>
</div>

</div>

<!-- SERVICE + BUDGET -->
<div class="form-group">

<div style="flex:1;">
<label>Select Service</label>

<select id="service" onchange="updateBudget()" required>
<option disabled selected value="">Choose a service</option>

<option value="logo">🎨 Logo Design</option>
<option value="flyer">📄 Flyer Design</option>
<option value="brand">🏷 Brand Identity</option>
<option value="socialgraphics">📱 Social Media Graphics</option>
<option value="socialmanagement">📈 Social Media Management</option>
<option value="web">🌐 Website Design</option>
<option value="combo">🔥 Combo Package</option>

</select>
</div>

<div style="flex:1;">
<label>Select Package / Budget</label>

<select id="budget" required>
<option disabled selected value="">Select budget</option>
</select>

</div>

</div>

<!-- DETAILS -->
<div class="form-group">

<div style="width:100%;">
<label>Project Details</label>
<textarea id="details" placeholder="Describe your creative vision..." required></textarea>
</div>

</div>

<!-- DATE -->
<div class="form-group">

<div style="width:100%;">
<label>Preferred Deadline</label>
<input type="date" id="date">
</div>

</div>

<!-- BUTTON -->
<div class="form-group">
<button onclick="sendToWhatsApp()">🚀 SUBMIT & START CHAT</button>
</div>

<p class="note">
Directly connected to Dr Beaver Graphic Designs via WhatsApp
</p>

</div>

<footer>
© 2026 Dr Beaver Graphic Designs
</footer>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBIjF4ZAYgQiEdgA-EID7nD3L1OTrymiZM",
authDomain: "dr-beaver-graphic-designs.firebaseapp.com",
projectId: "dr-beaver-graphic-designs",
storageBucket: "dr-beaver-graphic-designs.firebasestorage.app",
messagingSenderId: "129079631486",
appId: "1:129079631486:web:f42119fbd75cfdd9b1022f",
measurementId: "G-TPE1HQT5XT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.sendToWhatsApp = async function(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let service = document.getElementById("service").value;
let budget = document.getElementById("budget").value;
let details = document.getElementById("details").value.trim();
let date = document.getElementById("date").value;

if(!name || !email || !service || !budget || !details){
alert("Please fill all fields.");
return;
}

let orderId = "DB" + Math.floor(1000 + Math.random()*9000);

try{

await addDoc(collection(db,"orders"),{
orderId,
name,
email,
service,
budget,
details,
deadline: date || "Not specified",
status: "Pending",
createdAt: new Date()
});

alert("✅ Order Submitted!\nYour ID: " + orderId);

let msg =
`Hello Dr Beaver 👋

NEW ORDER

Order ID: ${orderId}
Name: ${name}
Service: ${service}
Budget: ${budget}`;

window.open("https://wa.me/263719194627?text=" + encodeURIComponent(msg));

}catch(err){
alert("Error submitting order");
console.log(err);
}

}

</script>



</body>
</html>
