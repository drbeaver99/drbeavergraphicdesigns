<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Start Your Project | Dr Beaver Graphic Designs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="33092934-ce15-4693-9722-5c513f7d7526.png">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
/* GLOBAL STYLES */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #050518;
    /* Premium Mesh Gradient Background */
    background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
    background-attachment: fixed;
    color: white;
    overflow-x: hidden;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(5,5,25,0.7);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 18px 0;
    text-align: center;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 18px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.7;
    transition: 0.3s;
}

nav a:hover {
    color: #c084fc;
    opacity: 1;
}

/* CONTAINER - Glassmorphism Refined */
.container {
    max-width: 800px;
    margin: 140px auto 60px;
    padding: 45px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
}

/* TYPOGRAPHY */
h1 {
    font-family: 'Syne', sans-serif;
    text-align: center;
    font-size: clamp(28px, 5vw, 42px);
    text-transform: uppercase;
    letter-spacing: -1px;
    margin-bottom: 10px;
    background: linear-gradient(to bottom, #fff, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    text-align: center;
    opacity: 0.6;
    margin-bottom: 40px;
    font-size: 16px;
}

/* FORM LAYOUT & STAGGERED REVEAL */
.form-group {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 25px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
}

/* Stagger timings for inputs */
.group-1 { animation-delay: 0.2s; }
.group-2 { animation-delay: 0.4s; }
.group-3 { animation-delay: 0.6s; }
.group-4 { animation-delay: 0.8s; }

label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    color: #c084fc;
}

/* INPUTS - Premium Glow */
input, select, textarea {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    transition: all 0.3s ease;
}

textarea {
    min-height: 140px;
    resize: none;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    background: rgba(255,255,255,0.08);
    border-color: #c084fc;
    box-shadow: 0 0 15px rgba(192, 132, 252, 0.2);
}

/* BUTTON - High End Shine */
button {
    width: 100%;
    padding: 18px;
    border-radius: 12px;
    background: #a855f7;
    color: white;
    border: none;
    margin-top: 10px;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
}

button:hover {
    transform: translateY(-5px);
    background: #c084fc;
    box-shadow: 0 15px 40px rgba(168, 85, 247, 0.5);
}

/* FOOTER & NOTES */
.note {
    text-align: center;
    font-size: 11px;
    opacity: 0.4;
    margin-top: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

footer {
    text-align: center;
    padding: 40px 20px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.4;
}

/* ANIMATIONS */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 600px) {
    .form-group {
        flex-direction: column;
        gap: 15px;
    }
    .container {
        margin: 110px 15px 40px;
        padding: 30px 20px;
    }
    nav a {
        margin: 0 8px;
        font-size: 11px;
    }
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="service.html">Services</a>
    <a href="order.html">Order</a>
    <a href="contact.html">Contact</a>
    <a href="portfolio.html">Portfolio</a>
</nav>

<div class="container">
    <h1>Start Your Project</h1>
    <p class="subtitle">Tell us what you need and we’ll bring your ideas to life.</p>

    <div class="form-group group-1">
        <div style="flex:1;">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="John Doe" required>
        </div>

        <div style="flex:1;">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>
    </div>

    <div class="form-group group-2">
        <div style="flex:1;">
            <label>Select Service</label>
            <select id="service" required>
                <option disabled selected value="">Choose a service</option>
                <option>🎨 Logo Design</option>
                <option>📄 Flyer Design</option>
                <option>🏷 Brand Identity</option>
                <option>📱 Social Media Graphics</option>
                <option>🌐 Website Design</option>
            </select>
        </div>

        <div style="flex:1;">
            <label>Est. Budget</label>
            <select id="budget" required>
                <option disabled selected value="">Select budget</option>
                <option>Under $15</option>
                <option>$15 - $30</option>
                <option>$30 - $50</option>
                <option>$50+</option>
            </select>
        </div>
    </div>

    <div class="form-group group-3">
        <div style="width:100%;">
            <label>Project Details</label>
            <textarea id="details" placeholder="Describe your creative vision..." required></textarea>
        </div>
    </div>

    <div class="form-group group-4">
        <div style="width:100%;">
            <label>Preferred Deadline</label>
            <input type="date" id="date">
        </div>
    </div>

    <div class="form-group group-4">
        <button onclick="sendToWhatsApp()">🚀 Submit & Start Chat</button>
    </div>

    <p class="note">
        Directly connected to Dr Beaver Graphic Designs via WhatsApp.
    </p>
</div>

<footer>
    © 2026 Dr Beaver Graphic Designs
</footer>

<script>
function sendToWhatsApp() {
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let service = document.getElementById("service").value;
    let budget = document.getElementById("budget").value;
    let details = document.getElementById("details").value.trim();
    let date = document.getElementById("date").value;

    if (!name || !email || !service || !budget || !details) {
        alert("Please fill in all required fields to proceed.");
        return;
    }

    let message = `Hello Dr Beaver 👋\n\n*NEW PROJECT REQUEST*\n\n👤 Name: ${name}\n📧 Email: ${email}\n🎨 Service: ${service}\n💰 Budget: ${budget}\n📝 Details: ${details}\n📅 Deadline: ${date || "Not specified"}`;

    let url = "https://wa.me/263719194627?text=" + encodeURIComponent(message);

    if (confirm("Open WhatsApp to send your project details?")) {
        window.open(url, "_blank");
    }
}
</script>

</body>
</html>
