<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dr Beaver Graphic Designs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    scroll-behavior: smooth;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(10,10,40,0.7);
    backdrop-filter: blur(10px);
    padding: 12px 0;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 12px;
    text-decoration: none;
    font-size: 14px;
    opacity: 0.8;
    transition: 0.3s;
}

nav a:hover {
    opacity: 1;
    color: #c084fc;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(10,10,40,0.9), rgba(40,0,80,0.9)),
                url('https://images.unsplash.com/photo-1559028012-481c04fa702d');
    background-size: cover;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

/* CONTENT */
.hero-content {
    max-width: 500px;
    animation: fadeIn 1.2s ease;
}

/* LOGO */
.logo {
    width: 110px;
    margin-bottom: 15px;
}

/* TEXT */
.hero-content h1 {
    font-size: 30px;
    color: #c084fc;
    line-height: 1.3;
}

.hero-content p {
    font-size: 15px;
    margin: 15px 0 25px;
    opacity: 0.9;
}

/* BUTTONS */
.btn {
    width: 90%;
    max-width: 300px;
    padding: 13px;
    margin: 10px auto;
    border-radius: 30px;
    background: linear-gradient(45deg, #6a0dad, #a855f7);
    color: white;
    border: none;
    display: block;
    font-size: 15px;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-2px);
    opacity: 0.9;
    cursor: pointer;
}

/* SECOND BUTTON STYLE */
.btn-outline {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 600px) {
    .hero-content h1 {
        font-size: 24px;
    }

    .hero-content p {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="index.html">Home</a>
    <a href="service.html">Services</a>
    <a href="order.html">Order</a>
    <a href="contact.html">Contact</a>
</nav>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">

        <img src="33092934-ce15-4693-9722-5c513f7d7526.png" class="logo" alt="Dr Beaver Logo">

        <h1>YOUR BRAND,<br>OUR CREATIVITY</h1>

        <p>We design bold, modern visuals that make your business stand out and attract customers.</p>

        <a href="order.html">
            <button class="btn">🚀 Start a Project</button>
        </a>

        <a href="https://wa.me/263719194627" target="_blank">
            <button class="btn btn-outline">💬 Chat on WhatsApp</button>
        </a>

    </div>
</div>

</body>
</html>
