<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Beaver Graphic Designs | Premium Visual Solutions</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family: 'Inter', sans-serif; /* Premium body font */
    background: #050518;
    color: white;
    overflow-x: hidden;
}

/* NAVBAR */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(5,5,25,0.7);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding:18px 0;
    text-align:center;
    z-index:1000;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 18px;
    font-size:13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity:0.7;
    transition:0.3s;
}

nav a:hover{
    color:#c084fc;
    opacity:1;
}

/* HERO WITH MESH GRADIENT */
.hero{
    height:100vh;
    background-color: #050518;
    /* Premium Mesh Gradient Background */
    background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
    background-attachment: fixed;
    position:relative;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* REFINED FLOATING GLOWS */
.hero::before,
.hero::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    animation:floatGlow 8s ease-in-out infinite;
    z-index: 1;
}

.hero::before{
    width:250px;
    height:250px;
    background:rgba(168,85,247,0.2);
    top:10%;
    left:5%;
}

.hero::after{
    width:300px;
    height:300px;
    background:rgba(99,102,241,0.15);
    bottom:5%;
    right:5%;
    animation-delay:3s;
}

/* CONTENT STAGGERED REVEAL */
.hero-content{
    max-width:650px;
    position:relative;
    z-index:5;
}

.hero-content > * {
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
}

/* Staggered entry timing */
.logo { animation-delay: 0.2s; }
h1 { animation-delay: 0.4s; }
p { animation-delay: 0.6s; }
.btn-primary { animation-delay: 0.8s; }
.btn-outline { animation-delay: 1s; }

/* LOGO */
.logo{
    width:100px;
    margin-bottom:25px;
    animation: floatLogo 4s ease-in-out infinite, fadeUp 0.8s ease forwards 0.2s;
}

/* TEXT */
h1 {
    font-family: 'Syne', sans-serif; /* High-end Heading Font */
    font-size: clamp(32px, 8vw, 56px); /* Responsive size */
    text-transform: uppercase;
    letter-spacing: -1px;
    line-height: 0.95;
    margin-bottom: 20px;
    background: linear-gradient(to bottom, #fff, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero-content p{
    font-size: 17px;
    max-width: 500px;
    margin: 0 auto 35px;
    opacity: 0.8;
    line-height: 1.6;
    letter-spacing: 0.2px;
}

/* BUTTONS */
.btn{
    width: 100%;
    max-width: 280px;
    padding: 16px;
    margin: 10px auto;
    border-radius: 12px; /* Slightly more modern than full round */
    text-decoration: none;
    display: block;
    color: white;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    position: relative;
    overflow: hidden;
}

.btn-primary {
    background: #a855f7;
    box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
}

.btn-primary:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(168, 85, 247, 0.5);
    background: #c084fc;
}

.btn-outline{
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
}

.btn-outline:hover{
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.5);
    transform: translateY(-5px);
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px 20px;
    font-size:12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity:0.4;
}

/* ANIMATIONS */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes floatLogo{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-15px); }
}

@keyframes floatGlow{
    0%,100%{ transform:translate(0, 0); }
    50%{ transform:translate(-20px, 20px); }
}

/* MOBILE ADJUSTMENTS */
@media(max-width:600px){
    nav a{
        margin:0 10px;
        font-size:11px;
    }
    .hero-content p{
        font-size:15px;
    }
}
</style>
</head>

        <p>
            Elevating businesses through bold, modern design and high-end visual storytelling.
        </p>

        <a href="order.html" class="btn btn-primary">🚀 Start a Project</a>

        <a href="https://wa.me/263719194627?text=Hi%20Dr%20Beaver,%20I%20need%20a%20design"
        target="_blank"
        class="btn btn-outline">

    </div>
