<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(10,10,40,0.8);
    padding: 10px 0;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
    font-size: 14px;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(10,10,40,0.9), rgba(40,0,80,0.9)),
                url('https://images.unsplash.com/photo-1559028012-481c04fa702d');
    background-size: cover;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.hero-content {
    max-width: 90%;
}

/* LOGO */
.hero-content img {
    width: 90px;
    margin-bottom: 15px;
}

/* TEXT */
.hero-content h1 {
    font-size: 28px;
    color: #c084fc;
    line-height: 1.3;
}

.hero-content p {
    font-size: 14px;
    margin: 15px 0;
}

/* BUTTONS */
.btn {
    width: 90%;
    max-width: 300px;
    padding: 12px;
    margin: 10px auto;
    border-radius: 25px;
    background: linear-gradient(45deg, #6a0dad, #a855f7);
    color: white;
    border: none;
    display: block;
}

/* SECTIONS */
section {
    padding: 50px 15px;
    text-align: center;
    background: #0f172a;
}

/* 📱 MOBILE FIX (IMPORTANT) */
@media (max-width: 600px) {

    .hero h1 {
        font-size: 24px;
    }

    nav a {
        display: inline-block;
        margin: 5px;
        font-size: 12px;
    }

}
    </style>
<body>
