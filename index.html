    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dr Beaver Graphic Designs</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(10,10,40,0.8);
    padding: 10px 0;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
    font-size: 14px;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(10,10,40,0.9), rgba(40,0,80,0.9)),
                url('https://images.unsplash.com/photo-1559028012-481c04fa702d');
    background-size: cover;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.hero-content {
    max-width: 90%;
}

/* LOGO FIX */
.logo {
    width: 120px;
    margin-bottom: 15px;
}

/* TEXT */
.hero-content h1 {
    font-size: 26px;
    color: #c084fc;
}

.hero-content p {
    font-size: 14px;
    margin: 10px 0 20px;
}

/* BUTTONS */
.btn {
    width: 90%;
    max-width: 300px;
    padding: 12px;
    margin: 10px auto;
    border-radius: 25px;
    background: linear-gradient(45deg, #6a0dad, #a855f7);
    color: white;
    border: none;
    display: block;
}

/* MOBILE */
@media (max-width: 600px) {
    .hero h1 {
        font-size: 22px;
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="index.html">Home</a>

    <a href="order.html">Order</a>

</nav>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">

        <h1>YOUR BRAND,<br>OUR CREATIVITY</h1>

        <p>We design bold, modern visuals that make your business stand out.</p>

        <a href="order.html"><button class="btn">Get Started</button></a>

            <button class="btn">WhatsApp Us</button>

    </div>
</div>

</body>
</html>
