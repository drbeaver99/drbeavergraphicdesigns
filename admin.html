<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Dashboard | Dr Beaver</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#050518;
color:white;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:25px;
color:#c084fc;
}

.topbar{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
min-width:220px;
}

button{
padding:14px 22px;
border:none;
border-radius:12px;
background:#a855f7;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}

.table-wrap{
overflow-x:auto;
background:rgba(255,255,255,0.04);
border-radius:18px;
padding:15px;
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
}

th,td{
padding:14px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,0.06);
font-size:14px;
}

th{
color:#c084fc;
}

select{
padding:10px;
border:none;
border-radius:10px;
background:#11142f;
color:white;
}

.status-pending{color:#facc15;}
.status-designing{color:#60a5fa;}
.status-completed{color:#4ade80;}
.status-delivered{color:#22c55e;}
.status-cancelled{color:#f87171;}

.small{
opacity:.6;
font-size:12px;
margin-top:8px;
text-align:center;
}

@media(max-width:700px){
.topbar{
flex-direction:column;
}
}
</style>
</head>
<body>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="topbar">
<input type="password" id="pass" placeholder="Enter Admin Password">
<button onclick="login()">Login</button>
<button onclick="loadOrders()">Refresh Orders</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Order ID</th>
<th>Name</th>
<th>Service</th>
<th>Budget</th>
<th>Status</th>
<th>Update</th>
</tr>
</thead>

<tbody id="ordersBody">
<tr>
<td colspan="6">Login first...</td>
</tr>
</tbody>
</table>
</div>

<p class="small">Manage all client orders here</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBIjF4ZAYgQiEdgA-EID7nD3L1OTrymiZM",
authDomain: "dr-beaver-graphic-designs.firebaseapp.com",
projectId: "dr-beaver-graphic-designs",
storageBucket: "dr-beaver-graphic-designs.firebasestorage.app",
messagingSenderId: "129079631486",
appId: "1:129079631486:web:f42119fbd75cfdd9b1022f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let unlocked = false;

window.login = function(){

let password = document.getElementById("pass").value.trim();

if(password === "Gushungo#1"){
unlocked = true;
loadOrders();
alert("Admin Access Granted");
}else{
alert("Wrong Password");
}

}

window.loadOrders = async function(){

if(!unlocked){
alert("Login first");
return;
}

const body = document.getElementById("ordersBody");
body.innerHTML = "<tr><td colspan='6'>Loading...</td></tr>";

const snap = await getDocs(collection(db,"orders"));

body.innerHTML = "";

snap.forEach((item)=>{

let data = item.data();

body.innerHTML += `
<tr>
<td>${data.orderId || ""}</td>
<td>${data.name || ""}</td>
<td>${data.service || ""}</td>
<td>${data.budget || ""}</td>

<td class="status-${(data.status || "pending").toLowerCase()}">
${data.status || "Pending"}
</td>

<td>
<select onchange="updateStatus('${item.id}',this.value)">
<option value="">Choose</option>
<option>Pending</option>
<option>Designing</option>
<option>Completed</option>
<option>Delivered</option>
<option>Cancelled</option>
</select>
</td>
</tr>
`;

});

}

window.updateStatus = async function(docId,newStatus){

if(!newStatus) return;

await updateDoc(doc(db,"orders",docId),{
status:newStatus
});

alert("Status Updated");

loadOrders();

}

</script>

</body>
</html>
